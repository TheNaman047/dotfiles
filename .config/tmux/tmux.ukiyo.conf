# filepath: tmux.ukiyo.conf
# Ukiyo Theme Configuration for tmux

set -g @ukiyo-theme "kanagawa/wave"
# =============================================================================
# STATUS BAR COMPONENTS / PLUGINS
# =============================================================================
# Available: battery, cpu-usage, git, gpu-usage, ram-usage, network, network-bandwidth, network-ping, ssh-session, time
set -g @ukiyo-plugins "ssh-session time battery "

# =============================================================================
# LEFT ICON
# =============================================================================
# Options: hostname, session, shortname, smiley, window, or any character
set -g @ukiyo-left-icon session

# =============================================================================
# VISUAL SEPARATORS & POWERLINE
# =============================================================================
# set -g @ukiyo-show-powerline true
# set -g @ukiyo-show-left-sep ' > '
# set -g @ukiyo-show-right-sep ' | '

# =============================================================================
# WINDOW FLAGS
# =============================================================================
set -g @ukiyo-show-flags true

# =============================================================================
# TIME OPTIONS
# =============================================================================
# Equivalent to rose-pine's @rose_pine_date_time '%Y-%m-%d %H:%M'
set -g @ukiyo-time-format "%F %R"
set -g @ukiyo-show-timezone false
set -g @ukiyo-military-time true

# =============================================================================
# NETWORK BANDWIDTH OPTIONS
# =============================================================================
# set -g @ukiyo-network-bandwidth wlan0
# set -g @ukiyo-network-bandwidth-interval 0
# set -g @ukiyo-network-bandwidth-show-interface true

# =============================================================================
# REFRESH RATE
# =============================================================================
set -g @ukiyo-refresh-rate 5

# =============================================================================
# PLUGIN COLORS (semantic roles)
# =============================================================================
set -g @ukiyo-network-bandwidth-colors "info bg_pane"
set -g @ukiyo-time-colors "muted bg_pane"

# =============================================================================
# BORDER
# =============================================================================
# set -g @ukiyo-border-contrast true
