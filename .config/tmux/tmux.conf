source-file ~/.config/tmux/tmux.configuration.conf

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Load tokyo night plugin/theme
# set -g @plugin "janoamaral/tokyo-night-tmux"
# source-file ~/.config/tmux/tmux.tokyo-night.conf

# Load rose pine plugin/theme
# set -g @plugin 'TheNaman047/rose-pine-tmux'
# source-file ~/.config/tmux/tmux.rose-pine.conf

# Load ukiyo plugin/theme
set -g @plugin 'Nybkox/tmux-ukiyo'
source-file ~/.config/tmux/tmux.ukiyo.conf

# Active theme (regenerated by ~/.config/theme/set-theme.sh, overrides the default above)
source-file -q ~/.config/tmux/theme-active.conf

# Load keybindings
source-file ~/.config/tmux/tmux.keybindings.conf

# Load network meter
# set -g @plugin 'xamut/tmux-network-bandwidth'

# Battery
# set -g @plugin 'tmux-plugins/tmux-battery'

# Tmxu to vim navigation helper
set -g @plugin 'christoomey/vim-tmux-navigator'

# Claude agent status: prefix+S switcher, prefix+W wait, prefix+p park.
# Remap sidebar o->G and next-done N->F (o=opencode, N=new-proj already bound).
set -g @plugin 'samleeney/tmux-agent-status'
set -g @agent-sidebar-key "G"
set -g @agent-next-done-key "F"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
